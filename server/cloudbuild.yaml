# Cloud Build config for deploying UILSON API to Cloud Run
steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/uilson/api:$SHORT_SHA', '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/uilson/api:latest', '.']
    dir: 'server'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/uilson/api']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'uilson-api'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/uilson/api:$SHORT_SHA'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--set-env-vars=GCLOUD_PROJECT=$PROJECT_ID'
      - '--add-cloudsql-instances=$PROJECT_ID:asia-northeast1:uilson-db'
      - '--set-env-vars=INSTANCE_UNIX_SOCKET=/cloudsql/$PROJECT_ID:asia-northeast1:uilson-db'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/uilson/api'

options:
  logging: CLOUD_LOGGING_ONLY
