name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Create Artifact Registry repo (if needed)
        continue-on-error: true
        run: |
          gcloud artifacts repositories create uilson-api \
            --repository-format=docker \
            --location=asia-northeast1 \
            --project=uilson-489209 \
            --quiet 2>/dev/null || true

      - name: Build and push Docker image
        run: |
          IMAGE="asia-northeast1-docker.pkg.dev/uilson-489209/uilson-api/server:${{ github.sha }}"
          IMAGE_LATEST="asia-northeast1-docker.pkg.dev/uilson-489209/uilson-api/server:latest"
          cd server
          docker build -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy uilson-api \
            --image "$IMAGE" \
            --region asia-northeast1 \
            --allow-unauthenticated \
            --add-cloudsql-instances uilson-489209:asia-northeast1:uilson-db \
            --update-env-vars="VITE_SLACK_CLIENT_ID=9162639476707.10688200182512,VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }},VITE_MS_CLIENT_ID=${{ secrets.VITE_MS_CLIENT_ID }},SLACK_CLIENT_SECRET=${{ secrets.SLACK_CLIENT_SECRET }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},MS_CLIENT_SECRET=${{ secrets.MS_CLIENT_SECRET }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --project uilson-489209 \
            --quiet

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: uilson-489209
          target: staging
          channelId: live

      - name: Deploy to Firebase Hosting (production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: uilson-489209
          target: production
          channelId: live
