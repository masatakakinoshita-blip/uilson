name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install functions dependencies
        run: cd functions && npm install

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create functions .env
        run: |
          echo "VITE_SLACK_CLIENT_ID=9162639476707.10688200182512" > functions/.env
          echo "SLACK_CLIENT_SECRET=${{ secrets.SLACK_CLIENT_SECRET }}" >> functions/.env
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> functions/.env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> functions/.env
          echo "VITE_MS_CLIENT_ID=${{ secrets.VITE_MS_CLIENT_ID }}" >> functions/.env
          echo "MS_CLIENT_SECRET=${{ secrets.MS_CLIENT_SECRET }}" >> functions/.env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> functions/.env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> functions/.env
          echo "Functions .env created with $(wc -l < functions/.env) lines"

      - name: Deploy Cloud Functions
        continue-on-error: true
        run: |
          firebase deploy --only functions --project uilson-489209 --force --debug 2>&1 | tail -100

      - name: Deploy to Cloud Run (with env vars)
        run: |
          cd server
          gcloud run deploy uilson-api \
            --source . \
            --region asia-northeast1 \
            --allow-unauthenticated \
            --add-cloudsql-instances uilson-489209:asia-northeast1:uilson-db \
            --set-env-vars="VITE_SLACK_CLIENT_ID=9162639476707.10688200182512,VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }},VITE_MS_CLIENT_ID=${{ secrets.VITE_MS_CLIENT_ID }}" \
            --set-env-vars="SLACK_CLIENT_SECRET=${{ secrets.SLACK_CLIENT_SECRET }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},MS_CLIENT_SECRET=${{ secrets.MS_CLIENT_SECRET }}" \
            --set-env-vars="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --quiet

      - name: Deploy to Firebase Hosting (staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: uilson-489209
          target: staging
          channelId: live

      - name: Deploy to Firebase Hosting (production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: uilson-489209
          target: production
          channelId: live
